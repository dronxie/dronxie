name: Update README Date

on:
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Update README timestamp
        run: |
          DATE=$(TZ=Asia/Kolkata date '+%d %B %Y, %I:%M %p IST')
          sed -i "/Last Updated:/c\Last Updated: $DATE" README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Auto update README date" || exit 0
          git push
